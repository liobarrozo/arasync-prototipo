<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AraSync - Prototipo</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <link rel="stylesheet" type="text/css" href="https://cdn.jsdelivr.net/npm/toastify-js/src/toastify.min.css">
    <script type="text/javascript" src="https://cdn.jsdelivr.net/npm/toastify-js"></script>
    
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap');
        body { font-family: 'Inter', sans-serif; background-color: #f3f4f6; margin: 0; }
        
        /* Contenedor iPhone */
        .iphone-frame {
            width: 375px; height: 812px;
            border: 12px solid #1a1a1a; border-radius: 40px;
            background: #f8fafc; position: relative;
            box-shadow: 0 25px 50px -12px rgba(0,0,0,0.25);
            margin: 20px auto;
            display: flex; flex-direction: column;
            overflow: hidden;
        }

        /* LÓGICA DE GIRO FORZADO PARA MOBILE */
        .panel-mode-mobile {
            position: fixed !important;
            top: 50% !important; left: 50% !important;
            width: 100vh !important; height: 100vw !important;
            transform: translate(-50%, -50%) rotate(90deg) !important;
            margin: 0 !important; border: none !important; border-radius: 0 !important;
            z-index: 999;
        }

        .kanban-column { min-width: 280px; background: #f1f5f9; border-radius: 12px; height: calc(100% - 20px); }
        .hide-element { display: none !important; }
    </style>
</head>
<body class="flex items-center justify-center min-h-screen">

    <div id="app-container" class="iphone-frame">
        
        <div id="promotor-view" class="flex flex-col h-full">
            <div class="p-6 text-center">
                <h1 class="text-xl font-bold text-slate-800 uppercase italic">Aramendi & Araride <span class="text-emerald-400">Sync</span></h1>
                <div class="mt-4 inline-flex items-center bg-sky-500 rounded-full px-4 py-1 text-white font-bold text-sm">
                    MODO: <span class="bg-emerald-400 ml-2 px-3 py-0.5 rounded-full uppercase">Promotor</span>
                </div>
            </div>

            <div class="flex-1 px-6">
                <div id="form-container" class="bg-white p-5 rounded-3xl shadow-sm border border-slate-100">
                    <h2 class="text-center font-bold text-slate-800 mb-4 uppercase text-[12px]">Nuevo Contacto</h2>
                    <div class="space-y-3">
                        <input type="text" id="input-nombre" placeholder="Nombre del Padre" class="w-full px-4 py-2 border rounded-xl outline-none">
                        <input type="text" placeholder="WhatsApp" class="w-full px-4 py-2 border rounded-xl outline-none">
                        <input type="text" placeholder="Colegio" class="w-full px-4 py-2 border rounded-xl outline-none">
                        <select class="w-full px-4 py-2 border rounded-xl bg-white outline-none">
                            <option>5° Secundaria</option>
                            <option>4° Secundaria</option>
                        </select>
                    </div>
                    <button onclick="enviarContacto()" class="w-full mt-6 bg-sky-600 text-white font-bold py-3 rounded-2xl shadow-lg active:scale-95 transition-transform">
                        AGREGAR CONTACTO +
                    </button>
                </div>

                <div id="loader-container" class="hide-element bg-white p-8 rounded-3xl shadow-sm border border-slate-100 text-center mt-4">
                    <div class="flex flex-col items-center space-y-4">
                        <div class="w-8 h-8 border-4 border-sky-600 border-t-transparent rounded-full animate-spin"></div>
                        <p id="loader-text" class="font-bold text-slate-600">Sincronizando...</p>
                    </div>
                </div>
            </div>

            <div class="p-6 bg-white border-t rounded-t-[40px]">
                <div class="flex justify-around text-center">
                    <div><p class="text-[10px] font-bold text-slate-400">HOY</p><p id="count-hoy" class="text-xl font-bold">5</p></div>
                    <div><p class="text-[10px] font-bold text-slate-400">SEMANA</p><p id="count-semana" class="text-xl font-bold">25</p></div>
                </div>
            </div>
        </div>

        <div id="vendedor-view" class="hide-element flex flex-col h-full bg-slate-200">
            <header class="bg-[#1e293b] text-white p-4 flex justify-between items-center shrink-0">
                <h2 class="font-bold text-[10px] tracking-tight uppercase">Panel del Vendedor</h2>
                <div class="text-[9px] bg-emerald-500/20 text-emerald-400 px-2 py-1 rounded border border-emerald-500/30">WhatsApp Conectado</div>
            </header>

            <div id="kanban-board" class="flex flex-1 p-4 gap-4 overflow-x-auto">
                </div>
        </div>
    </div>

    <script>
        // MOCKUP DATA
        const mockData = {
            nuevos: [
                { nombre: "Juan García", colegio: "San José", grado: "5° Sec", marca: "Aramendi" },
                { nombre: "Marta Gómez", colegio: "Nacional", grado: "5° Sec", marca: "Araride" },
                { nombre: "Roberto Paz", colegio: "Industrial", grado: "4° Sec", marca: "Aramendi" }
            ],
            activos: [
                { nombre: "Sofía López", colegio: "Santa María", grado: "5° Sec", marca: "Araride" }
            ],
            citas: [
                { nombre: "Carlos Pérez", colegio: "Normal 1", grado: "5° Sec", marca: "Reunión Jueves" }
            ]
        };

        function renderKanban() {
            const board = document.getElementById('kanban-board');
            board.innerHTML = '';

            const columns = [
                { title: "Nuevos Leads", key: "nuevos", color: "border-emerald-400" },
                { title: "En Contacto", key: "activos", color: "border-sky-400" },
                { title: "Citas", key: "citas", color: "border-amber-400" }
            ];

            columns.forEach(col => {
                let cardsHtml = mockData[col.key].map(item => `
                    <div class="bg-white p-3 rounded-xl shadow-sm border-l-4 ${col.color} mb-3 border border-slate-200">
                        <p class="text-[11px] font-bold">${item.marca}: ${item.nombre}</p>
                        <p class="text-[9px] text-slate-400 mb-2">${item.colegio}, ${item.grado}</p>
                        <button class="w-full bg-sky-800 text-white text-[9px] py-1.5 rounded font-bold">Gestionar</button>
                    </div>
                `).join('');

                board.innerHTML += `
                    <div class="kanban-column p-3 flex flex-col shrink-0">
                        <span class="text-[9px] font-bold text-slate-500 mb-3 uppercase tracking-widest">${col.title}</span>
                        ${cardsHtml || '<p class="text-[9px] italic text-slate-400">Sin registros</p>'}
                    </div>
                `;
            });
        }

        function enviarContacto() {
            const nombre = document.getElementById('input-nombre').value || "Nuevo Padre";
            document.getElementById('form-container').classList.add('hide-element');
            document.getElementById('loader-container').classList.remove('hide-element');
            
            Toastify({ text: "📍 Sincronizando ubicación...", style: { background: "#6366f1" } }).showToast();

            setTimeout(() => {
                // Agregar el nuevo lead al mockup
                mockData.nuevos.unshift({ nombre: nombre, colegio: "Colegio Demo", grado: "5° Sec", marca: "Aramendi" });
                renderKanban();

                document.getElementById('count-hoy').innerText = "6";
                document.getElementById('count-semana').innerText = "26";

                Toastify({ text: "✅ Enviado al Panel!", style: { background: "#10b981" } }).showToast();

                setTimeout(irAPanel, 2000);
            }, 1500);
        }

        function irAPanel() {
            const container = document.getElementById('app-container');
            document.getElementById('promotor-view').classList.add('hide-element');
            document.getElementById('vendedor-view').classList.remove('hide-element');

            // Si es mobile, aplicamos el giro forzado
            if (window.innerWidth < 1024) {
                container.classList.add('panel-mode-mobile');
                Toastify({ text: "📱 Gira tu pantalla para ver el Panel", duration: 5000 }).showToast();
            }

            renderKanban();
        }

        // Inicializar
        renderKanban();
    </script>
</body>
</html>
